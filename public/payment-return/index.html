<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment return - ChowTrek</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="section legal">
      <span class="eyebrow">Payment</span>
      <h1>Return to ChowTrek.</h1>
      <p data-payment-status>
        Verifying your card payment. Keep this page open for a moment, then return to the app.
      </p>
      <a class="primary-button" data-open-app href="chowtrek://orders">Back to ChowTrek app</a>
      <p>
        <a href="/">Open download page instead</a>
      </p>
    </main>
    <script>
      const statusEl = document.querySelector("[data-payment-status]");
      const openAppLink = document.querySelector("[data-open-app]");
      const params = new URLSearchParams(window.location.search);
      const provider = (params.get("provider") || "monnify").toLowerCase();
      const reference =
        params.get("paymentReference") ||
        params.get("paymentreference") ||
        params.get("txnref") ||
        params.get("txnRef") ||
        params.get("txn_ref") ||
        params.get("transactionreference") ||
        params.get("transactionReference") ||
        params.get("MerchantReference") ||
        params.get("merchantReference");

      if (!reference) {
        statusEl.textContent =
          "ChowTrek did not receive a payment reference. Open the app and refresh your order or wallet screen.";
      } else {
        const endpoint = provider === "monnify" ? "/api/monnify-verify" : "/api/quickteller-verify";

        fetch(`${endpoint}?${params.toString()}`)
          .then((response) => response.json())
          .then((result) => {
            statusEl.textContent = result.ok
              ? "Payment verified. Return to ChowTrek and refresh your order or wallet screen."
              : result.message || "Payment is still pending verification. Return to ChowTrek and refresh shortly.";
          })
          .catch(() => {
            statusEl.textContent =
              "Payment verification could not finish right now. Return to ChowTrek and refresh shortly.";
          });
      }

      openAppLink.addEventListener("click", () => {
        window.setTimeout(() => {
          if (!document.hidden) {
            window.location.href = "/";
          }
        }, 1200);
      });
    </script>
  </body>
</html>
