<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment return - ChowTrek</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="section legal">
      <span class="eyebrow">Payment</span>
      <h1>Return to ChowTrek.</h1>
      <p data-payment-status>
        Verifying your card payment. Keep this page open for a moment, then return to the app.
      </p>
      <a class="primary-button" href="/">Back to ChowTrek</a>
    </main>
    <script>
      const statusEl = document.querySelector("[data-payment-status]");
      const params = new URLSearchParams(window.location.search);
      const reference =
        params.get("txnref") ||
        params.get("txnRef") ||
        params.get("txn_ref") ||
        params.get("transactionreference") ||
        params.get("transactionReference") ||
        params.get("MerchantReference") ||
        params.get("merchantReference");

      if (!reference) {
        statusEl.textContent =
          "ChowTrek did not receive a payment reference. Open the app and refresh your order or wallet screen.";
      } else {
        fetch(`/api/quickteller-verify?${params.toString()}`)
          .then((response) => response.json())
          .then((result) => {
            statusEl.textContent = result.ok
              ? "Payment verified. Return to ChowTrek and refresh your order or wallet screen."
              : result.message || "Payment is still pending verification. Return to ChowTrek and refresh shortly.";
          })
          .catch(() => {
            statusEl.textContent =
              "Payment verification could not finish right now. Return to ChowTrek and refresh shortly.";
          });
      }
    </script>
  </body>
</html>
